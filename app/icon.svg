<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cursorvers Capture">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1d52"/>
      <stop offset="100%" stop-color="#040a1f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg2)"/>

  <!-- Back card: business card (no lines) -->
  <g transform="translate(170 210) rotate(-12)">
    <rect width="190" height="120" rx="14" fill="#7a93cf" opacity="0.55"/>
  </g>

  <!-- Middle card: memo with bullet lines -->
  <g transform="translate(160 200) rotate(-3)">
    <rect width="210" height="160" rx="14" fill="#dde6f8"/>
    <rect x="22" y="32" width="120" height="10" rx="5" fill="#1e3a8a" opacity="0.5"/>
    <rect x="22" y="56" width="160" height="10" rx="5" fill="#1e3a8a" opacity="0.3"/>
    <rect x="22" y="80" width="100" height="10" rx="5" fill="#1e3a8a" opacity="0.3"/>
  </g>

  <!-- Front card: receipt with itemized lines + giza bottom + total -->
  <g transform="translate(150 195) rotate(6)">
    <path d="M 0 0 H 200 V 175 L 180 165 L 160 175 L 140 165 L 120 175 L 100 165 L 80 175 L 60 165 L 40 175 L 20 165 L 0 175 Z" fill="#ffffff"/>
    <rect x="22" y="24" width="100" height="8" rx="4" fill="#0a1a4a"/>
    <rect x="22" y="50" width="156" height="6" rx="3" fill="#0a1a4a" opacity="0.4"/>
    <rect x="22" y="68" width="130" height="6" rx="3" fill="#0a1a4a" opacity="0.4"/>
    <rect x="22" y="86" width="145" height="6" rx="3" fill="#0a1a4a" opacity="0.4"/>
    <rect x="22" y="118" width="60" height="10" rx="5" fill="#fb923c"/>
  </g>

  <!-- AI sparkle top-right -->
  <g transform="translate(380 132)">
    <path d="M 0 -22 L 5 -5 L 22 0 L 5 5 L 0 22 L -5 5 L -22 0 L -5 -5 Z" fill="#fb923c"/>
    <circle r="6" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
