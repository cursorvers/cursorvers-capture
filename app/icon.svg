<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cursorvers Capture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a4a"/>
      <stop offset="100%" stop-color="#050d29"/>
    </linearGradient>
    <radialGradient id="aperture-glow" cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#fb923c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- canvas: deep navy with subtle vertical fade -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- soft radial glow behind aperture -->
  <rect width="512" height="512" fill="url(#aperture-glow)"/>

  <!-- viewfinder corner brackets (4 corners) -->
  <g stroke="#fb923c" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 132 188 L 132 132 L 188 132"/>
    <path d="M 324 132 L 380 132 L 380 188"/>
    <path d="M 132 324 L 132 380 L 188 380"/>
    <path d="M 324 380 L 380 380 L 380 324"/>
  </g>

  <!-- capture dot — orange disc with subtle inner highlight -->
  <circle cx="256" cy="256" r="56" fill="url(#dot)"/>
  <circle cx="256" cy="240" r="20" fill="#ffffff" opacity="0.18"/>
</svg>
