<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cursorvers Capture">
  <defs>
    <linearGradient id="cap-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1d52"/>
      <stop offset="100%" stop-color="#050d29"/>
    </linearGradient>
    <radialGradient id="cap-glow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#fb923c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cap-dot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Navy canvas with subtle vertical fade -->
  <rect width="512" height="512" fill="url(#cap-bg)"/>

  <!-- Soft orange glow behind aperture -->
  <rect width="512" height="512" fill="url(#cap-glow)"/>

  <!-- Viewfinder corner brackets — 4 corners, capture-app signature -->
  <g
    stroke="#fb923c"
    stroke-width="18"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M 128 188 L 128 128 L 188 128"/>
    <path d="M 324 128 L 384 128 L 384 188"/>
    <path d="M 128 324 L 128 384 L 188 384"/>
    <path d="M 324 384 L 384 384 L 384 324"/>
  </g>

  <!-- Shutter dot — orange disc with subtle inner highlight -->
  <circle cx="256" cy="256" r="58" fill="url(#cap-dot)"/>
  <circle cx="256" cy="240" r="22" fill="#ffffff" opacity="0.18"/>
</svg>
