<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cursorvers">
  <defs>
    <linearGradient id="cv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1d52"/>
      <stop offset="100%" stop-color="#050d29"/>
    </linearGradient>
    <linearGradient id="cv-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dde6f8"/>
      <stop offset="100%" stop-color="#7a93cf"/>
    </linearGradient>
    <radialGradient id="cv-star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Navy canvas with subtle vertical fade -->
  <rect width="512" height="512" fill="url(#cv-bg)"/>

  <!-- Orbit ring (saturn-style) -->
  <ellipse
    cx="256" cy="290"
    rx="170" ry="55"
    fill="none"
    stroke="url(#cv-mark)"
    stroke-width="8"
    stroke-linecap="round"
    transform="rotate(-18 256 290)"
  />

  <!-- Cursor arrow pointing up-right -->
  <g fill="url(#cv-mark)" stroke="url(#cv-mark)" stroke-width="6" stroke-linejoin="round">
    <path d="M220 168 L348 252 L286 262 L274 332 Z"/>
  </g>

  <!-- Star sparkle at the cursor head (4-point + glow) -->
  <g>
    <circle cx="220" cy="168" r="36" fill="url(#cv-star)"/>
    <path
      d="M220 142 L226 162 L246 168 L226 174 L220 194 L214 174 L194 168 L214 162 Z"
      fill="#ffffff"
    />
  </g>
</svg>
